  :root{
    --black:#0a0a0a;
    --dark:#1d1d1f;
    --gray1:#6e6e73;
    --gray2:#96969b;
    --gray3:#d2d2d7;
    --gray4:#f5f5f7;
    --white:#ffffff;
    --line:#e5e5e7;
    --g1:#3a3a3c;
    --g2:#8e6bd1;
    --g3:#4a90d9;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--white);
    color:var(--black);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    height:100vh;
  }
  .stage{
    height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* TOP BAR */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 40px;
    flex:0 0 auto;
  }
  .brand{
    font-size:13px;
    font-weight:600;
    letter-spacing:.04em;
    color:var(--gray1);
  }
  .progress-track{
    flex:1;
    max-width:360px;
    margin:0 28px;
    height:3px;
    background:var(--gray4);
    border-radius:3px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--black);
    border-radius:3px;
    transition:width .45s cubic-bezier(.65,0,.35,1);
  }
  .step-count{
    font-size:13px;
    color:var(--gray1);
    font-variant-numeric:tabular-nums;
    min-width:44px;
    text-align:right;
  }

  /* MAIN STAGE */
  .slides{
    flex:1;
    position:relative;
    overflow:hidden;
  }
  .slide{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:10px 60px 30px;
    opacity:0;
    transform:translateX(40px);
    pointer-events:none;
    transition:opacity .5s cubic-bezier(.65,0,.35,1), transform .5s cubic-bezier(.65,0,.35,1);
    overflow-y:auto;
  }
  .slide.active{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
  }
  .slide.prev{transform:translateX(-40px);}

  .slide-inner{
    max-width:860px;
    width:100%;
    margin:0 auto;
    padding-top:18px;
  }

  .kicker{
    font-size:12.5px;
    font-weight:700;
    letter-spacing:.10em;
    text-transform:uppercase;
    color:var(--gray1);
    text-align:center;
    margin-bottom:14px;
  }
  .step-title{
    font-family:"Dost Serif", -apple-system, sans-serif;
    font-weight:700;
    font-size:clamp(34px,5.6vw,62px);
    text-align:center;
    letter-spacing:-0.01em;
    line-height:1.05;
    margin:0 0 16px;
  }
  .step-sub{
    text-align:center;
    font-size:17px;
    color:var(--gray1);
    max-width:600px;
    margin:0 auto 34px;
    line-height:1.5;
  }

  .content-row{
    display:flex;
    gap:28px;
    align-items:stretch;
  }
  .content-col{flex:1;}

  .bullet-card{
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px 20px;
    display:flex;
    align-items:flex-start;
    gap:14px;
    margin-bottom:12px;
  }
  .bullet-num{
    flex:0 0 auto;
    width:26px;height:26px;
    border-radius:50%;
    background:var(--black);
    color:var(--white);
    font-size:12px;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .bullet-text{font-size:14.5px;color:var(--dark);padding-top:3px;}
  .bullet-text b{color:var(--black);}

  /* bar chart */
  .chart{margin:26px 0 18px;}
  .bar-row{
    display:grid;
    grid-template-columns:150px 1fr 60px;
    align-items:center;
    gap:14px;
    padding:9px 0;
  }
  .bar-label{font-size:13px;color:var(--dark);font-weight:500;}
  .bar-track{
    height:16px;
    background:var(--gray4);
    border-radius:8px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:8px;
  }
  .bar-val{font-size:12.5px;color:var(--gray1);text-align:right;font-variant-numeric:tabular-nums;}

  .fill-mono{background:linear-gradient(90deg,#1d1d1f,#000);}
  .fill-g1{background:linear-gradient(90deg,#5b8def,#7b5cf0);}
  .fill-g2{background:linear-gradient(90deg,#7b5cf0,#c15be0);}
  .fill-g3{background:linear-gradient(90deg,#3ac0a0,#5b8def);}

  /* two pole layout for final step */
  .poles{
    display:flex;
    gap:20px;
    align-items:stretch;
    margin:20px 0 8px;
  }
  .pole{
    flex:1;
    border-radius:20px;
    padding:26px 24px;
    border:1px solid var(--line);
  }
  .pole.core{
    background:var(--black);
    color:var(--white);
    border:none;
  }
  .pole-label{
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:14px;
    opacity:.65;
  }
  .avatars{display:flex;gap:8px;margin-bottom:16px;}
  .avatar{
    width:40px;height:40px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;
    background:linear-gradient(135deg,#5b8def,#c15be0);
    color:#fff;
  }
  .pole h4{margin:0 0 8px;font-size:17px;font-weight:700;}
  .pole p{margin:0;font-size:13.5px;line-height:1.55;opacity:.9;}
  .pole.core p{opacity:.85;}
  .loop-arrow{
    display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;
    width:44px;
    font-size:20px;
    color:var(--gray2);
  }

  .flow-note{
    text-align:center;
    font-size:13px;
    color:var(--gray1);
    margin-top:18px;
    max-width:520px;
    margin-left:auto;margin-right:auto;
  }
  .flow-note b{color:var(--black);}

  /* donut */
  .donut-wrap{display:flex;justify-content:center;margin:8px 0 10px;}
  .donut{position:relative;width:150px;height:150px;}
  .donut svg{transform:rotate(-90deg);}
  .donut-center{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .donut-num{font-size:26px;font-weight:700;}
  .donut-sub{font-size:10.5px;color:var(--gray1);}

  /* DETAILS TOGGLE + PANEL */
  .details-toggle{
    display:flex;
    justify-content:center;
    margin-top:22px;
  }
  .details-btn{
    background:var(--white);
    border:1px solid var(--gray3);
    color:var(--dark);
    font-size:13px;
    font-weight:600;
    padding:9px 18px;
    border-radius:20px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition:background .2s;
  }
  .details-btn:hover{background:var(--gray4);}
  .details-btn .chev{
    transition:transform .3s;
    font-size:10px;
  }
  .details-btn.open .chev{transform:rotate(180deg);}

  .details-panel{
    max-height:0;
    overflow:hidden;
    transition:max-height .45s cubic-bezier(.65,0,.35,1), margin-top .45s;
    margin-top:0;
  }
  .details-panel.open{
    max-height:1200px;
    margin-top:20px;
  }
  .details-inner{
    background:var(--gray4);
    border-radius:16px;
    padding:22px 26px;
    font-size:13px;
    color:var(--dark);
  }
  .details-inner h5{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--gray1);
    margin:0 0 10px;
    font-weight:700;
  }
  .details-inner table{width:100%;border-collapse:collapse;margin-bottom:14px;}
  .details-inner th{
    text-align:left;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--gray1);
    padding:6px 8px;
    border-bottom:1px solid var(--gray3);
  }
  .details-inner td{
    font-size:12.5px;
    padding:7px 8px;
    border-bottom:1px solid #e8e8ea;
    vertical-align:top;
  }
  .details-inner tr:last-child td{border-bottom:none;}
  .details-inner p{margin:0 0 10px;line-height:1.5;}
  .details-inner ul{margin:0 0 10px;padding-left:18px;}
  .details-inner li{margin-bottom:5px;line-height:1.45;}
  .tag{
    display:inline-block;
    font-size:10px;
    font-weight:700;
    padding:2px 7px;
    border-radius:10px;
    background:var(--white);
    border:1px solid var(--gray3);
    color:var(--gray1);
  }

  /* NAV */
  .navbar{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:22px;
    padding:18px 40px 26px;
  }
  .nav-btn{
    width:42px;height:42px;
    border-radius:50%;
    border:1px solid var(--gray3);
    background:var(--white);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    font-size:16px;
    color:var(--black);
    transition:background .2s, opacity .2s;
  }
  .nav-btn:hover{background:var(--gray4);}
  .nav-btn[disabled]{opacity:.3;cursor:default;}
  .dots{display:flex;gap:8px;}
  .dot{
    width:7px;height:7px;
    border-radius:50%;
    background:var(--gray3);
    cursor:pointer;
    transition:background .25s, transform .25s;
  }
  .dot.active{background:var(--black);transform:scale(1.3);}

  @media (max-width:760px){
    .topbar{padding:16px 20px;}
    .slide{padding:6px 22px 20px;}
    .content-row{flex-direction:column;}
    .poles{flex-direction:column;}
    .loop-arrow{transform:rotate(90deg);margin:4px auto;}
    .bar-row{grid-template-columns:100px 1fr 46px;gap:8px;}
  }
</style>
</head>
<body>
<div class="stage">

  <div class="topbar">
    <div class="brand">AI AT THE OFFICE</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="step-count" id="stepCount">1 / 6</div>
  </div>

  <div class="slides" id="slides"></div>

  <div class="navbar">
    <div class="nav-btn" id="prevBtn">&#8592;</div>
    <div class="dots" id="dots"></div>
    <div class="nav-btn" id="nextBtn">&#8594;</div>
  </div>

</div>

<script>
const steps = [
{
  kicker:"The Situation",
  title:"132 Hours a Week",
  sub:"That's roughly how much time the whole office spends writing and searching, every single week. AI already touches most of it — just not on purpose.",
  body:`
    <div class="chart">
      <div class="bar-row"><div class="bar-label">Writing text</div><div class="bar-track"><div class="bar-fill fill-mono" style="width:76%"></div></div><div class="bar-val">57 hrs</div></div>
      <div class="bar-row"><div class="bar-label">Searching / organizing</div><div class="bar-track"><div class="bar-fill fill-g1" style="width:100%"></div></div><div class="bar-val">75 hrs</div></div>
    </div>
    <div class="content-row">
      <div class="bullet-card"><div class="bullet-num">1</div><div class="bullet-text"><b>79%</b> already use AI tools — occasionally or regularly</div></div>
      <div class="bullet-card"><div class="bullet-num">2</div><div class="bullet-text">But it's <b>fragmented</b> — everyone's figuring it out alone</div></div>
    </div>
  `,
  details:`
    <h5>How the estimate was built</h5>
    <p>24 of 34 employees responded (71% response rate) to a 13-day internal survey. Time ranges were converted to hour midpoints: under 1h → 0.5h, 1–3h → 2h, 3–5h → 4h, 5h+ → 6h — then summed across all 24 respondents.</p>
    <table>
      <tr><th>Time / week</th><th>Writing text</th><th>Searching / organizing</th></tr>
      <tr><td>Under 1 hour</td><td>5 people (21%)</td><td>5 people (21%)</td></tr>
      <tr><td>1–3 hours</td><td>14 people (58%)</td><td>7 people (29%)</td></tr>
      <tr><td>3–5 hours</td><td>2 people (8%)</td><td>7 people (29%)</td></tr>
      <tr><td>5+ hours</td><td>3 people (13%)</td><td>5 people (21%)</td></tr>
      <tr><td><b>Estimated total</b></td><td><b>≈ 57 hrs / week</b></td><td><b>≈ 75 hrs / week</b></td></tr>
    </table>
    <p>AI adoption: 14 people "occasionally," 5 "regularly," 3 "rarely," 2 "not yet."</p>
  `
},
{
  kicker:"The Priorities",
  title:"Email First. Then Minutes.",
  sub:"Seven task clusters, ranked by volume, how well AI can help today, and how frustrating they are.",
  body:`
    <div class="chart">
      <div class="bar-row"><div class="bar-label">Email</div><div class="bar-track"><div class="bar-fill fill-g1" style="width:100%"></div></div><div class="bar-val">20–25h</div></div>
      <div class="bar-row"><div class="bar-label">Meeting minutes</div><div class="bar-track"><div class="bar-fill fill-g1" style="width:60%"></div></div><div class="bar-val">10–15h</div></div>
      <div class="bar-row"><div class="bar-label">Research</div><div class="bar-track"><div class="bar-fill fill-g3" style="width:80%"></div></div><div class="bar-val">15–20h</div></div>
      <div class="bar-row"><div class="bar-label">Texts / reports</div><div class="bar-track"><div class="bar-fill fill-g1" style="width:48%"></div></div><div class="bar-val">8–12h</div></div>
    </div>
    <div class="flow-note">Filing and plan-checking hurt the most — but they need <b>IT / BIM fixes</b>, not chat AI. Addressed separately, not part of this rollout.</div>
  `,
  details:`
    <h5>Full cluster ranking</h5>
    <table>
      <tr><th>Rank</th><th>Cluster</th><th>Hrs/wk</th><th>AI fit</th><th>Frustration</th></tr>
      <tr><td>1</td><td>Email communication</td><td>20–25</td><td>Solve now</td><td>High</td></tr>
      <tr><td>2</td><td>Minutes / meeting docs</td><td>10–15</td><td>Solve now</td><td>High</td></tr>
      <tr><td>3</td><td>Research / standards / products</td><td>15–20</td><td>Partial</td><td>Medium</td></tr>
      <tr><td>4</td><td>Texts / specs / reports</td><td>8–12</td><td>Solve now</td><td>Medium</td></tr>
      <tr><td>5</td><td>Scheduling / pending items</td><td>8–10</td><td>Partial</td><td>Medium</td></tr>
      <tr><td>6</td><td>Filing / document search</td><td>8–12</td><td>Structural fix needed</td><td>High</td></tr>
      <tr><td>7</td><td>Plan checking / planner alignment</td><td>10–15</td><td>Not AI-solvable today</td><td>Very high</td></tr>
    </table>
    <p><b>AI-fit legend:</b> 1 = solvable now with Claude/Copilot · 2 = partly solvable, needs vetted prompts and review · 3 = not solvable with current AI — structural or software problem.</p>
  `
},
{
  kicker:"What We Roll Out First",
  title:"Five Quick Wins",
  sub:"Each one starts small, saves real time within the first two weeks, and always keeps a human checking the output.",
  body:`
    <div class="content-row">
      <div class="bullet-card"><div class="bullet-num">1</div><div class="bullet-text"><b>Email templates</b> — 30–45 min saved per person, per week</div></div>
      <div class="bullet-card"><div class="bullet-num">2</div><div class="bullet-text"><b>Meeting minutes</b> — 45–90 min saved per protocol</div></div>
    </div>
    <div class="content-row">
      <div class="bullet-card"><div class="bullet-num">3</div><div class="bullet-text"><b>Research helper</b> — 30–60 min saved per research task</div></div>
      <div class="bullet-card"><div class="bullet-num">4</div><div class="bullet-text"><b>Specs & reports</b> — 1–2 hrs saved per longer text</div></div>
    </div>
    <div class="content-row">
      <div class="bullet-card"><div class="bullet-num">5</div><div class="bullet-text"><b>Document summaries</b> — 30–60 min saved per document</div></div>
    </div>
  `,
  details:`
    <h5>What each quick win actually involves</h5>
    <table>
      <tr><th>Quick win</th><th>What</th><th>Needs</th></tr>
      <tr><td>Email templates</td><td>8–10 saved prompts for the most common email types, matched to office tone</td><td>Paid tier for shared projects</td></tr>
      <tr><td>Meeting minutes</td><td>Notes or audio in → structured minutes out (agenda, decisions, owners, dates) — always reviewed before sending</td><td>Skip if attendees decline AI note-taking</td></tr>
      <tr><td>Research helper</td><td>Material comparisons, product options, starting points for standards — never the final word on a standard</td><td>Web search enabled</td></tr>
      <tr><td>Specs & reports</td><td>Rough notes or a prior document in → polished draft out, in house style</td><td>No personal data in prompts (HR texts: anonymize first)</td></tr>
      <tr><td>Document summaries</td><td>Upload a PDF (tender, contract, report) → 10-sentence summary or side-by-side comparison</td><td>No confidential contracts without a privacy check first</td></tr>
    </table>
  `
},
{
  kicker:"Building Trust",
  title:"Real Concerns, Clear Rules",
  sub:"18 of 24 people raised a concern in the survey. That's not a reason to slow down — it's exactly what the ground rules below are for.",
  body:`
    <div class="donut-wrap">
      <div class="donut">
        <svg width="150" height="150" viewBox="0 0 150 150">
          <circle cx="75" cy="75" r="62" fill="none" stroke="#f5f5f7" stroke-width="14"/>
          <circle cx="75" cy="75" r="62" fill="none" stroke="url(#gradDonut)" stroke-width="14"
            stroke-dasharray="389.6" stroke-dashoffset="97.4" stroke-linecap="round"/>
          <defs>
            <linearGradient id="gradDonut" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#5b8def"/>
              <stop offset="100%" stop-color="#c15be0"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="donut-center"><div class="donut-num">18/24</div><div class="donut-sub">raised a concern</div></div>
      </div>
    </div>
    <div class="content-row">
      <div class="bullet-card"><div class="bullet-num">1</div><div class="bullet-text">AI drafts. <b>A person always checks and owns it</b> before it goes out.</div></div>
      <div class="bullet-card"><div class="bullet-num">2</div><div class="bullet-text">No HR data, salaries, or medical info ever goes into a prompt.</div></div>
      <div class="bullet-card"><div class="bullet-num">3</div><div class="bullet-text">For standards and codes: AI finds the starting point — the original source still rules.</div></div>
    </div>
  `,
  details:`
    <h5>The concerns, in short</h5>
    <table>
      <tr><th>Concern</th><th>The rule</th></tr>
      <tr><td>Errors / wrong answers</td><td>AI drafts, a human reviews and is accountable. Nothing leaves unchecked.</td></tr>
      <tr><td>Privacy / sensitive data</td><td>No HR data (salaries, IDs, medical) in AI tools. Minutes only with everyone's consent.</td></tr>
      <tr><td>Standards / legal reliability</td><td>AI helps locate a passage; the original document is always the binding source.</td></tr>
      <tr><td>Copyright / where data comes from</td><td>Low risk for text (based on your own input); AI images must be clearly labelled as such.</td></tr>
      <tr><td>Losing the personal touch</td><td>Use AI for the grunt work (minutes, standard emails), not the creative work.</td></tr>
      <tr><td>"Do we stop thinking for ourselves?"</td><td>Apprentices learn the task first, then get AI as a speed-up — never a shortcut past learning.</td></tr>
      <tr><td>Energy use</td><td>A focused prompt uses less than an hour of scattershot Googling with 30 tabs open.</td></tr>
      <tr><td>Misuse</td><td>Clear usage guidelines; if AI helped shape a deliverable, that's said out loud internally.</td></tr>
    </table>
  `
},
{
  kicker:"The Business Case",
  title:"$250 vs. Real Hours Back",
  sub:"Eight weeks of paid access for a small group costs less than one billable day — even a cautious read on the payoff clears that bar easily.",
  body:`
    <div class="chart">
      <div class="bar-row"><div class="bar-label">Cost, 8 weeks</div><div class="bar-track"><div class="bar-fill fill-mono" style="width:5%"></div></div><div class="bar-val">$250</div></div>
      <div class="bar-row"><div class="bar-label">Value at 20% realized</div><div class="bar-track"><div class="bar-fill fill-g2" style="width:55%"></div></div><div class="bar-val">CHF 4.8k</div></div>
      <div class="bar-row"><div class="bar-label">Value at full adoption</div><div class="bar-track"><div class="bar-fill fill-g2" style="width:100%"></div></div><div class="bar-val">CHF 24k</div></div>
    </div>
    <div class="flow-note">Based on a conservative internal rate of <b>CHF 60/hour</b> and realistic, partial adoption — not the optimistic full number.</div>
  `,
  details:`
    <h5>The math</h5>
    <p>5 licenses at USD 25/person/month = USD 125/month → <b>USD 250</b> for the 8-week pilot window. Internal training time is not counted in cash terms.</p>
    <p>If the office fully captured the estimated 50–100 hours/week saved, that's worth roughly CHF 24'000 over 8 weeks at a conservative CHF 60/hour internal rate. Realistically, only a fraction of that lands in the first 8 weeks — even at 20% realization, that's <b>CHF 4'800</b> against USD 250 in cost.</p>
    <p>These are directional numbers meant to justify a small, low-risk trial — not a guaranteed return.</p>
  `
},
{
  kicker:"The Model — Starting Now",
  title:"Three People. Two Speeds.",
  sub:"Rather than a big rollout, we start with a small core and let it prove itself.",
  body:`
    <div class="poles">
      <div class="pole core">
        <div class="pole-label">Core team — paid access</div>
        <div class="avatars">
          <div class="avatar">B</div>
          <div class="avatar">L</div>
          <div class="avatar">A</div>
        </div>
        <h4>Borbála, Louis, Alejandro</h4>
        <p>The three heaviest, most confident AI users get paid-tier access. They use it daily, push into new use cases, and become the go-to people for everyone else.</p>
      </div>
      <div class="loop-arrow">&#8646;</div>
      <div class="pole">
        <div class="pole-label">Everyone else — on demand</div>
        <h4>Come to us when you need it</h4>
        <p>For a one-off, specific task that could use AI — a tricky email, a summary, a research question — just ask Borbála, Louis, or Alejandro directly. No new tool to learn, no account to set up.</p>
      </div>
    </div>
    <div class="flow-note">Every <b>1–2 weeks</b>, the three meet privately to compare notes — new tricks, upgrades worth adopting, what's not working — and carry it back to the office.</div>
  `,
  details:`
    <h5>Why three people, not the original five-person pilot</h5>
    <p>The Phase 2 analysis proposed a 5-person pilot spanning GL, two PL roles, Interior Architecture, and Architecture — chosen as heavy users and natural multipliers for their departments.</p>
    <p>This is a deliberately leaner version of that same idea: instead of formal training modules and a scheduled 8-week rollout to the whole office, three confident, already-active AI users get paid access and act as the standing point of contact. The weekly/biweekly private sync replaces the original "consolidation & measurement" checkpoint — same purpose, lighter process.</p>
    <ul>
      <li><b>Lower cost, lower commitment</b> — 3 licenses instead of 5+, no scheduled training modules up front.</li>
      <li><b>Faster to start</b> — no need to finalize usage policy or book training slots before beginning.</li>
      <li><b>Built-in feedback loop</b> — the recurring sync is where new upgrades and use cases get evaluated before being shared wider.</li>
      <li><b>Everyone still gets help</b> — nobody without paid access is left without a path to using AI for a real task.</li>
    </ul>
    <p>Apprentices are intentionally not included yet, in line with the original recommendation that AI use for training content needs pedagogical guidance first.</p>
  `
}
];

let current = 0;
const slidesEl = document.getElementById('slides');
const dotsEl = document.getElementById('dots');

steps.forEach((s, i) => {
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.id = 'slide-' + i;
  slide.innerHTML = `
    <div class="slide-inner">
      <div class="kicker">${s.kicker}</div>
      <div class="step-title">${s.title}</div>
      <div class="step-sub">${s.sub}</div>
      ${s.body}
      <div class="details-toggle">
        <button class="details-btn" data-idx="${i}">Show the data <span class="chev">&#9660;</span></button>
      </div>
      <div class="details-panel" id="panel-${i}">
        <div class="details-inner">${s.details}</div>
      </div>
    </div>
  `;
  slidesEl.appendChild(slide);

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.dataset.idx = i;
  dotsEl.appendChild(dot);
});

function render(){
  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.toggle('active', i === current);
    el.classList.toggle('prev', i < current);
  });
  document.querySelectorAll('.dot').forEach((el, i) => {
    el.classList.toggle('active', i === current);
  });
  document.getElementById('progressFill').style.width = ((current+1)/steps.length*100) + '%';
  document.getElementById('stepCount').textContent = (current+1) + ' / ' + steps.length;
  document.getElementById('prevBtn').toggleAttribute('disabled', current === 0);
  document.getElementById('nextBtn').toggleAttribute('disabled', current === steps.length - 1);
}

document.getElementById('prevBtn').addEventListener('click', () => { if(current>0){current--; render();} });
document.getElementById('nextBtn').addEventListener('click', () => { if(current<steps.length-1){current++; render();} });
dotsEl.addEventListener('click', (e) => {
  const d = e.target.closest('.dot');
  if(!d) return;
  current = parseInt(d.dataset.idx);
  render();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight'){ if(current<steps.length-1){current++; render();} }
  if(e.key === 'ArrowLeft'){ if(current>0){current--; render();} }
});

slidesEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.details-btn');
  if(!btn) return;
  const idx = btn.dataset.idx;
  const panel = document.getElementById('panel-' + idx);
  panel.classList.toggle('open');
  btn.classList.toggle('open');
  btn.innerHTML = panel.classList.contains('open')
    ? 'Hide the data <span class="chev">&#9660;</span>'
    : 'Show the data <span class="chev">&#9660;</span>';
});

render();
</script>
</body>
</html>
