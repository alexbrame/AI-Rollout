  :root{
    --black:#0a0a0a;
    --dark:#1d1d1f;
    --gray1:#6e6e73;
    --gray2:#96969b;
    --gray3:#d2d2d7;
    --gray4:#f5f5f7;
    --white:#ffffff;
    --line:#e5e5e7;
    --g1:#3a3a3c;
    --g2:#8e6bd1;
    --g3:#4a90d9;
    --accent:#eb736e;
    --accent-light:#f2a19d;
    --accent-lighter:#f8cac7;
    --accent-dark:#d85c56;
    --accent-darker:#b8443f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--white);
    color:var(--black);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    height:100vh;
  }
  .stage{
    height:100vh;
    display:flex;
    flex-direction:column;
  }

  /* TOP BAR */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:22px 40px;
    flex:0 0 auto;
  }
  .brand{
    font-size:13px;
    font-weight:600;
    letter-spacing:.04em;
    color:var(--gray1);
  }
  .progress-track{
    flex:1;
    max-width:360px;
    margin:0 28px;
    height:3px;
    background:var(--gray4);
    border-radius:3px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--black);
    border-radius:3px;
    transition:width .45s cubic-bezier(.65,0,.35,1);
  }
  .step-count{
    font-size:13px;
    color:var(--gray1);
    font-variant-numeric:tabular-nums;
    min-width:44px;
    text-align:right;
  }

  /* MAIN STAGE */
  .slides{
    flex:1;
    position:relative;
    overflow:hidden;
  }
  .slide{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:10px 60px 30px;
    opacity:0;
    transform:translateX(40px);
    pointer-events:none;
    transition:opacity .5s cubic-bezier(.65,0,.35,1), transform .5s cubic-bezier(.65,0,.35,1);
    overflow-y:auto;
  }
  .slide.active{
    opacity:1;
    transform:translateX(0);
    pointer-events:auto;
  }
  .slide.prev{transform:translateX(-40px);}

  .slide-inner{
    max-width:860px;
    width:100%;
    margin:0 auto;
    padding-top:18px;
  }

  .kicker{
    font-size:12.5px;
    font-weight:700;
    letter-spacing:.10em;
    text-transform:uppercase;
    color:var(--gray1);
    text-align:center;
    margin-bottom:14px;
  }
  .step-title{
    font-family:"Dost Serif", -apple-system, sans-serif;
    font-weight:700;
    color:var(--accent);
    font-size:clamp(34px,5.6vw,62px);
    text-align:center;
    letter-spacing:-0.01em;
    line-height:1.05;
    margin:0 0 16px;
  }
  .step-sub{
    text-align:center;
    font-size:17px;
    color:var(--gray1);
    max-width:600px;
    margin:0 auto 34px;
    line-height:1.5;
  }

  .content-row{
    display:flex;
    gap:28px;
    align-items:stretch;
  }
  .content-col{flex:1;}

  .bullet-card{
    border:1px solid var(--line);
    border-radius:16px;
    padding:16px 20px;
    display:flex;
    align-items:flex-start;
    gap:14px;
    margin-bottom:12px;
  }
  .bullet-num{
    flex:0 0 auto;
    width:26px;height:26px;
    border-radius:50%;
    background:var(--black);
    color:var(--white);
    font-size:12px;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .bullet-text{font-size:14.5px;color:var(--dark);padding-top:3px;}
  .bullet-text b{color:var(--black);}

  /* bar chart */
  .chart{margin:26px 0 18px;}
  .bar-row{
    display:grid;
    grid-template-columns:150px 1fr 60px;
    align-items:center;
    gap:14px;
    padding:9px 0;
  }
  .bar-label{font-size:13px;color:var(--dark);font-weight:500;}
  .bar-track{
    height:16px;
    background:var(--gray4);
    border-radius:8px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:8px;
  }
  .bar-val{font-size:12.5px;color:var(--gray1);text-align:right;font-variant-numeric:tabular-nums;}

  .fill-mono{background:linear-gradient(90deg,var(--accent-darker),var(--accent-dark));}
  .fill-g1{background:linear-gradient(90deg,var(--accent-dark),var(--accent));}
  .fill-g2{background:linear-gradient(90deg,var(--accent),var(--accent-light));}
  .fill-g3{background:linear-gradient(90deg,var(--accent-light),var(--accent-lighter));}

  /* two pole layout for final step */
  .poles{
    display:flex;
    gap:20px;
    align-items:stretch;
    margin:20px 0 8px;
  }
  .pole{
    flex:1;
    border-radius:20px;
    padding:26px 24px;
    border:1px solid var(--line);
  }
  .pole.core{
    background:var(--black);
    color:var(--white);
    border:none;
  }
  .pole-label{
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    margin-bottom:14px;
    opacity:.65;
  }
  .avatars{display:flex;gap:8px;margin-bottom:16px;}
  .avatar{
    width:40px;height:40px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;
    background:linear-gradient(135deg,var(--accent-dark),var(--accent));
    color:#fff;
  }
  .pole h4{margin:0 0 8px;font-size:17px;font-weight:700;}
  .pole p{margin:0;font-size:13.5px;line-height:1.55;opacity:.9;}
  .pole.core p{opacity:.85;}
  .loop-arrow{
    display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;
    width:44px;
    font-size:20px;
    color:var(--gray2);
  }

  .flow-note{
    text-align:center;
    font-size:13px;
    color:var(--gray1);
    margin-top:18px;
    max-width:520px;
    margin-left:auto;margin-right:auto;
  }
  .flow-note b{color:var(--black);}

  /* donut */
  .donut-wrap{display:flex;justify-content:center;margin:8px 0 10px;}
  .donut{position:relative;width:150px;height:150px;}
  .donut svg{transform:rotate(-90deg);}
  .donut-center{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .donut-num{font-size:26px;font-weight:700;}
  .donut-sub{font-size:10.5px;color:var(--gray1);}

  /* DETAILS TOGGLE + PANEL */
  .details-toggle{
    display:flex;
    justify-content:center;
    margin-top:22px;
  }
  .details-btn{
    background:var(--white);
    border:1px solid var(--gray3);

let current = 0;
const slidesEl = document.getElementById('slides');
const dotsEl = document.getElementById('dots');

steps.forEach((s, i) => {
  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.id = 'slide-' + i;
  const hasDetails = !!(s.details && s.details.trim());
  slide.innerHTML = `
    <div class="slide-inner${s.cover ? ' slide-cover' : ''}">
      ${s.kicker ? `<div class="kicker">${s.kicker}</div>` : ''}
      <div class="step-title">${s.title}</div>
      <div class="step-sub">${s.sub}</div>
      ${s.body}
      ${hasDetails ? `
      <div class="details-toggle">
        <button class="details-btn" data-idx="${i}">Daten anzeigen <span class="chev">&#9660;</span></button>
      </div>
      <div class="details-panel" id="panel-${i}">
        <div class="details-inner">${s.details}</div>
      </div>` : ''}
    </div>
  `;
  // prep "sliders" (bar-fills) and donut rings to animate in from zero each time the slide is shown
  slide.querySelectorAll('.bar-fill').forEach(el => {
    el.dataset.target = el.style.width || '0%';
    el.style.width = '0%';
  });
  slidesEl.appendChild(slide);

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.dataset.idx = i;
  dotsEl.appendChild(dot);
});

function render(){
  document.querySelectorAll('.slide').forEach((el, i) => {
    el.classList.toggle('active', i === current);
    el.classList.toggle('prev', i < current);
  });
  document.querySelectorAll('.dot').forEach((el, i) => {
    el.classList.toggle('active', i === current);
  });
  document.getElementById('progressFill').style.width = ((current+1)/steps.length*100) + '%';
  document.getElementById('stepCount').textContent = (current+1) + ' / ' + steps.length;
  document.getElementById('prevBtn').toggleAttribute('disabled', current === 0);
  document.getElementById('nextBtn').toggleAttribute('disabled', current === steps.length - 1);
  animateSlide(current);
}

function animateSlide(idx){
  const slide = document.getElementById('slide-' + idx);
  if(!slide) return;

  // staggered fade-up for content blocks
  const sel = '.kicker, .step-title, .step-sub, .bullet-card, .bar-row, .pole, .donut-wrap, .big-donut-wrap, .faq-block, .takeaway-card, .dist-wrap, .flow-note, .cover-meta, .details-toggle';
  slide.querySelectorAll(sel).forEach((el, i) => {
    el.classList.remove('anim-in');
    void el.offsetWidth;
    el.style.animationDelay = Math.min(i * 55, 600) + 'ms';
    el.classList.add('anim-in');
  });

  // "sliders" (bar-fill progress bars) grow from zero
  const bars = slide.querySelectorAll('.bar-fill');
  bars.forEach(el => { el.style.width = '0%'; });
  void slide.offsetWidth;
  bars.forEach((el, i) => {
    setTimeout(() => { el.style.width = el.dataset.target; }, 180 + Math.min(i * 50, 300));
  });

  // donut / pie rings draw in
  const rings = slide.querySelectorAll('.donut-ring');
  rings.forEach(el => { el.style.strokeDashoffset = el.dataset.circ; });
  void slide.offsetWidth;
  rings.forEach((el, i) => {
    setTimeout(() => { el.style.strokeDashoffset = el.dataset.target; }, 220 + i * 140);
  });

  // count-up numbers
  slide.querySelectorAll('.count-up').forEach(el => {
    const target = parseInt(el.dataset.target, 10);
    const dur = 900;
    let start = null;
    function step(ts){
      if(!start) start = ts;
      const p = Math.min((ts - start) / dur, 1);
      el.textContent = Math.round(p * target);
      if(p < 1) requestAnimationFrame(step);
      else el.textContent = target;
    }
    requestAnimationFrame(step);
  });
}

document.getElementById('prevBtn').addEventListener('click', () => { if(current>0){current--; render();} });
document.getElementById('nextBtn').addEventListener('click', () => { if(current<steps.length-1){current++; render();} });
dotsEl.addEventListener('click', (e) => {
  const d = e.target.closest('.dot');
  if(!d) return;
  current = parseInt(d.dataset.idx);
  render();
});
document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight'){ if(current<steps.length-1){current++; render();} }
  if(e.key === 'ArrowLeft'){ if(current>0){current--; render();} }
});

slidesEl.addEventListener('click', (e) => {
  const btn = e.target.closest('.details-btn');
  if(!btn) return;
  const idx = btn.dataset.idx;
  const panel = document.getElementById('panel-' + idx);
  panel.classList.toggle('open');
  btn.classList.toggle('open');
  btn.innerHTML = panel.classList.contains('open')
    ? 'Daten ausblenden <span class="chev">&#9660;</span>'
    : 'Daten anzeigen <span class="chev">&#9660;</span>';
});

render();
</script>
